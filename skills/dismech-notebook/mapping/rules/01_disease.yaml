name: disease
description: Map dismech disease entities to dm-disease in alh_deep_research
depends_on: []
idempotent: true
source_match: |
  match
    $d isa disease, has name $n;
  fetch {
    "name": $n
  };
target_insert: |
  insert
    $td isa dm-disease,
      has id $skolem_id,
      has name $name;
skolem_keys: [name]
